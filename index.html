    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wine:   #632424;
      --text:   #2b2b2b;
      --muted:  #808183;
      --border: #e0d9d9;
      --bg:     #ffffff;
    }

    body {
      font-family: 'Kirvy', Georgia, serif;
      background: var(--bg);
      margin: 0;
      padding: 0;
    }

    .banner {
      width: 100%;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .accent {
      width: 3px;
      height: 28px;
      background: var(--wine);
      flex-shrink: 0;
      border-radius: 1px;
    }

    .label {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
      letter-spacing: 0.01em;
      flex: 1;
    }

    .label strong {
      font-style: normal;
      font-weight: 700;
      color: var(--text);
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .count-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }

    .count {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--wine);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 2ch;
      text-align: right;
    }

    .count-unit {
      font-size: 0.85rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      margin-left: 4px;
      transition: background 0.4s;
    }
    .dot.live  { background: #5a9e6f; animation: blink 2.5s ease-in-out infinite; }
    .dot.error { background: #c0392b; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .progress {
      width: 100%;
      height: 2px;
      background: var(--border);
    }
    .progress-fill {
      height: 100%;
      background: var(--wine);
      opacity: 0.35;
      transform-origin: left;
      animation: drain var(--iv, 10s) linear forwards;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>

<div class="banner">
  <div class="accent"></div>
  <span class="label">
    Pessoas na fila do Restaurante <strong>Casa Branca</strong>
  </span>
  <div class="divider"></div>
  <div class="count-wrap">
    <span class="count" id="count">—</span>
    <span class="count-unit" id="unit">na fila</span>
  </div>
  <div class="dot" id="dot"></div>
</div>

<div class="progress">
  <div class="progress-fill" id="bar"></div>
</div>

<script>
  const INTERVAL = 10;

  const elCount = document.getElementById('count');
  const elUnit  = document.getElementById('unit');
  const elDot   = document.getElementById('dot');
  const elBar   = document.getElementById('bar');

  document.documentElement.style.setProperty('--iv', INTERVAL + 's');

  function resetBar() {
    elBar.style.animation = 'none';
    elBar.offsetHeight;
    elBar.style.animation = 'drain ' + INTERVAL + 's linear forwards';
  }

  async function fetchQueue() {
    try {
      const res  = await fetch('/api/queue', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

     const count = Array.isArray(data) ? data.length : null;

if (count === null) throw new Error('resposta inesperada da API — veja o console');

      elCount.textContent = count;
      elUnit.textContent  = count === 1 ? 'pessoa' : 'pessoas';
      elDot.className = 'dot live';
    } catch (e) {
      elCount.textContent = '—';
      elDot.className = 'dot error';
      console.error('[Casa Branca / Fila]', e);
    }
    resetBar();
  }

  fetchQueue();
  setInterval(fetchQueue, INTERVAL * 1000);
</script>

</body>
</html>
